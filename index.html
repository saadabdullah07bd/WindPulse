  <body style="margin: 0;">
    <script>
      (function(){
        var t=localStorage.getItem("windpulse-theme")||"light";
        var c={light:"hsl(0,0%,98%)",dark:"hsl(25,12%,8%)",midnight:"hsl(230,25%,10%)",ocean:"hsl(200,30%,12%)",rose:"hsl(340,20%,92%)",monochrome:"hsl(0,0%,7%)",forest:"hsl(150,20%,10%)",desert:"hsl(35,30%,12%)"};
        document.body.style.backgroundColor=c[t]||c.light;
        if(t!=="light")document.documentElement.classList.add(t);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
